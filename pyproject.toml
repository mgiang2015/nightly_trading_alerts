[tool.ruff]
line-length = 100

[tool.ruff.lint]
# E = pycodestyle errors, F = pyflakes, I = isort
select = ["E", "F", "I"]
ignore = [
    "E501",   # line too long — reported by formatter, not enforced here
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F401"]   # unused imports in test files are fine (fixtures etc.)
