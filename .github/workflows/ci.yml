name: CI

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests
        env:
          WATCHLIST: TEST.SI
          TELEGRAM_TOKEN: dummy
          TELEGRAM_CHAT_ID: dummy
        run: pytest
